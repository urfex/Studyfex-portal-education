    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Escape Road</title>
    <link rel="shortcut icon" href="icon.png">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init()</script>
    <style>
        @font-face {
            font-family: myFirstFont;
            src: url(Chainwhacks.otf);
        }
        #logo-canvas, body {
            font-family: myFirstFont;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }
        #unity-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body class="dark">
    <div id="unity-container" class="unity-desktop">
        <p style="opacity: 0;position: absolute;">_</p>
        <canvas id="unity-canvas" style="width: 100%; height: 100%;"></canvas>
    </div>
    <div id="loading-cover" style="display:none;background: black; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999;">
        <div id="unity-loading-bar" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
            <canvas id="logo-canvas" style="background-color: black;">
                <img src="loading.png" id="ld_bg" style="display: none;">
                <img src="car-icon.png" id="ld_car" style="display: none;">
            </canvas>
        </div>
    </div>
    <img id="azlogo" class="az" src="az_logo.png" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000;">

    <script>
        const container = document.querySelector("#unity-container");
        const canvas = document.querySelector("#unity-canvas");
        const loadingCover = document.querySelector("#loading-cover");
        const buildUrl = "TemplateData";
        const loaderUrl = buildUrl + "/loader.js";
        const config = {
            dataUrl: buildUrl + "/data.unityweb",
            frameworkUrl: buildUrl + "/framework.js.unityweb",
            codeUrl: buildUrl + "/wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "1games.io",
            productName: "Escape Road",
            productVersion: "2.0",
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            container.className = "unity-mobile";
            config.devicePixelRatio = 1;
        }

        function delay(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function load() {
            var az_logo = document.getElementById('azlogo');
            az_logo.style.opacity = 0;
            logo_loaded = true;
            az_logo.style.display = 'none';
            logo_loaded = false;

            createUnityInstance(canvas, config, (progress) => {
                logo_loading_percent = progress;
                drawCanvas(progress);
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                setTimeout(() => {
                    loadingCover.style.display = "none";
                    logo_loaded = true;
                    window.focus();
                }, 2000);
            }).catch((message) => {
                console.error(message);
            });
        }

        loadingCover.style.display = "";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            load();
        };

        var logo_loaded = false;
        var logo_loading_percent = 0;

        window.onresize = () => drawCanvas(logo_loading_percent);
        window.onload = () => drawCanvas(logo_loading_percent);

        var logo_canvas = document.getElementById("logo-canvas");
        function drawCanvas(_percent = 0) {
            if (logo_loaded) return;
            resizeLogoCanvas();
            var ctx = logo_canvas.getContext("2d");
            var ld_bg = document.getElementById("ld_bg");
            var ld_car = document.getElementById("ld_car");

            var _sw = logo_canvas.width / 1920;
            var _sh = logo_canvas.height / 1080;

            if (_percent > 1) _percent = 1;

            ctx.drawImage(ld_bg, 0, 0, logo_canvas.width, logo_canvas.height);

            ctx.fillStyle = "#977e21";
            var _lw = 700;
            var _lh = 50;
            ctx.fillRect((1920 - _lw) * 0.5 * _sw, (1080 - 150) * _sh, _lw * _sw, _lh * _sh);

            ctx.fillStyle = "#fad234";
            var _pad = 5;
            var _pw = (_lw - _pad * 2);
            var _ph = _lh - _pad * 2;
            var _px = (1920 - _pw) * 0.5;
            ctx.fillRect(_px * _sw, (1080 - 150 + _pad) * _sh, _pw * _percent * _sw, _ph * _sh);

            ctx.font = "35px myFirstFont";
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.shadowColor = "black";
            ctx.shadowOffsetY = 2;
            var new_per = parseInt(_percent * 100);
            ctx.fillText("" + new_per + "%", logo_canvas.width / 2, logo_canvas.height / 2 + _sh * 425);
        }

        function resizeLogoCanvas() {
            var _w = window.innerWidth;
            var _h = window.innerHeight;
            var _nw = _h * 16 / 9;
            if (_nw <= _w) {
                logo_canvas.width = _nw;
                logo_canvas.height = _h;
            } else {
                logo_canvas.width = _w;
                logo_canvas.height = _w * 9 / 16;
            }
        }

        document.body.appendChild(script);
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-analytics-compat.js"></script>

        firebase.initializeApp(firebaseConfig);
    </script>
</body>
</html>
