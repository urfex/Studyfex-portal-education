<!DOCTYPE html>
<html lang="en-us">
<base href="https://cdn.jsdelivr.net/gh/bubbls/UGS-Assets@0942a64704ef01a6c519f36509b911ca1e550c94/lucky%20ducky%20obby%20wobby/">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="./style.css" />
  <title>Lucky Block Obby</title>
  <!-- Yandex Games SDK -->
  <script src="https://yandex.ru/games/sdk/v2"></script>
  <style>
    canvas:focus {
      outline: none;
    }

    html,
    body {
      padding: 0;
      margin: 0;
      overflow: hidden;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
      height: 100%;
      background: #000;
    }
  </style>
</head>

<body class="dark">
  <div id="unity-container" class="unity-desktop">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>
  <div id="loading-cover" style="display:none;">
    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty" style="display: none;">
        <div id="unity-progress-bar-full"></div>
      </div>
      <div class="spinner"></div>
    </div>
  </div>
  <script>
    const hideFullScreenButton = "";
    const buildUrl = "Build";
    const loaderUrl = buildUrl + "/Build.loader.js";
    const config = {
      dataUrl: buildUrl + "/Build.data.unityweb",
      frameworkUrl: buildUrl + "/Build.framework.js.unityweb",
      codeUrl: buildUrl + "/Build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Obby jail break two players",
      productVersion: "0.1"
    };

    const container = document.querySelector("#unity-container");
    const canvas = document.querySelector("#unity-canvas");
    const loadingCover = document.querySelector("#loading-cover");
    const progressBarEmpty = document.querySelector("#unity-progress-bar-empty");
    const progressBarFull = document.querySelector("#unity-progress-bar-full");
    const spinner = document.querySelector('.spinner');

    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
      container.className = "unity-mobile";
    }

    loadingCover.style.display = "";

    document.addEventListener('contextmenu', event => event.preventDefault());

    function FocusGame() {
      window.focus();
      canvas.focus();
    }

    window.addEventListener('pointerdown', () => {
      FocusGame();
    });
    window.addEventListener('touchstart', () => {
      FocusGame();
    });

    let StartUnityInstance;
    let myGameInstance = null;
    let ysdk = null;
    let player = null;
    let leaderboard;
    let payments = null;
    let initGame = false;
    let nowFullAdOpen = false;

    const script = document.createElement("script");
    script.src = loaderUrl;
    script.onload = () => {
      StartUnityInstance = function() {
        createUnityInstance(canvas, config, (progress) => {
          spinner.style.display = "none";
          progressBarEmpty.style.display = "";
          progressBarFull.style.width = `${100 * progress}%`;
        }).then((unityInstance) => {
          myGameInstance = unityInstance;
          loadingCover.style.display = "none";
        }).catch((message) => {
          console.error(message);
        });
      };
      if (LocalHost())
        StartUnityInstance_IfUnloaded();
    };

    function StartUnityInstance_IfUnloaded() {
      if (spinner.style.display !== "none")
        StartUnityInstance();
    }

    function LocalHost() {
      var host = window.location.hostname;
      if (host == "localhost" || host == "127.0.0.1")
        return true;
      else return false;
    }

    setTimeout(StartUnityInstance_IfUnloaded, 5000);

    InitYSDK();
    async function InitYSDK() {
      try {
        if (LocalHost()) return;

        console.log('Init Yandex SDK');
        ysdk = await YaGames.init();

        FullAdShow();

      } catch (e) {
        console.error('CRASH Initialization SDK: ', e);
      }

      StartUnityInstance_IfUnloaded();
    }

    function FullAdShow() {
      try {
        if (nowFullAdOpen !== true && ysdk !== null) {
          ysdk.adv.showFullscreenAdv({
            callbacks: {
              onOpen: () => {
                nowFullAdOpen = true;
                if (initGame === true) {
                  myGameInstance.SendMessage('YandexGame', 'OpenFullAd');
                }
              },
              onClose: (wasShown) => {
                nowFullAdOpen = false;
                if (initGame === true) {
                  if (wasShown) {
                    myGameInstance.SendMessage('YandexGame', 'CloseFullAd', 'true');
                  } else {
                    myGameInstance.SendMessage('YandexGame', 'CloseFullAd', 'false');
                  }
                }
                FocusGame();
              },
              onError: (error) => {
                console.error('Error Ad Interstitial', error);
                myGameInstance.SendMessage('YandexGame', 'ErrorFullAd');
                FocusGame();
              }
            }
          });
        }
      } catch (e) {
        console.error('CRASH FullAd Show: ', e.message);
      }
    }

    document.body.appendChild(script);
  </script>
</body>
</html>
