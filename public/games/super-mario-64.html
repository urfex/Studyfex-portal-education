<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Super Mario 64</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #000000;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #startButton {
            display: block;
            width: 200px;
            height: 60px;
            background-color: #e62423;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            border: 4px solid #fff;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            box-shadow: 0px 0px 20px rgba(230, 36, 35, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        #startButton:hover {
            transform: scale(1.05);
            box-shadow: 0px 0px 30px rgba(230, 36, 35, 0.8);
        }

        #game {
            width: 100%;
            height: 100%;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <button id="startButton">PLAY MARIO 64</button>

    <script>
        function startGame() {
            document.getElementById("game").style.display = "block";
            document.getElementById("startButton").style.display = "none";
            
            window.EJS_player = "#game";
            window.EJS_core = "parallel_n64";
            window.EJS_color = "#000000";
            window.EJS_startOnLoaded = true;
            window.EJS_pathtodata = "https://cdn.jsdelivr.net/gh/genizy/emu@master/";
            window.EJS_gameUrl = "https://cdn.jsdelivr.net/gh/bubbls/clsm64@139e09e38eb3e7783095eee30fdf75b18ee59e02/Super%20Mario%2064%20(USA).zip";
            window.EJS_defaultOptions = {
                vsync: "disabled"
            };

            var script = document.createElement("script");
            script.src = "https://cdn.jsdelivr.net/gh/genizy/emu@master/loader.js";
            document.body.appendChild(script);
        }

        document.getElementById("startButton").addEventListener("click", startGame);
    </script>
</body>
</html>
