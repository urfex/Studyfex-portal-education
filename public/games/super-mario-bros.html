<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Super Mario Bros</title>
    <style type="text/css">
        #button {
            display:none;
        }
        .imgb_vis {
            animation: imgb-animation 7s linear;
        }
        @keyframes imgb-animation {
            10% { transform: translateX(0); }
            20% { transform: translateX(100px); }
            90% { transform: translateX(100px); }
            100% { transform: translateX(0); }
        }
        .FullScreenMario { 
            color: white;
        }
        @font-face { 
            font-family: 'Press Start';
            src: url('https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/Fonts/pressstart2p-webfont.eot?#iefix') format('embedded-opentype'), 
                 url('https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/Fonts/pressstart2p-webfont.woff') format('woff'), 
                 url('https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/Fonts/pressstart2p-webfont.ttf') format('truetype'), 
                 url('https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/Fonts/pressstart2p-webfont.svg') format('svg');
            font-weight: normal;
            font-style: normal;
        }
    </style>
    <link href="https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/index.min.css" rel="stylesheet" type="text/css">
</head>
<body dir="ltr" style="background: #000; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden;">
    <section id="game">
        <div class="EightBitter FullScreenMario" style="position: relative; width: 972px; height: 464px; font-family: 'Press Start';">
            <canvas width="972" height="464" style="width: 972px; height: 464px;"></canvas>
            <div class="touch-passer-container" style="position: absolute; inset: 0px; display: none;">
                <!-- Touch controls omitted for brevity as they are generated by the script usually, but keeping the structure -->
            </div>
            <table id="dataDisplay" style="position: absolute; top: 0px; width: 972px; color: white; font-size: 21px; text-transform: uppercase;">
                <tr style="padding: 7px 14px 0px; text-align: center;">
                    <td class="FullScreenMario_value score"><div>score</div><div>0</div></td>
                    <td class="FullScreenMario_value time"><div>time</div><div>397</div></td>
                    <td class="FullScreenMario_value world"><div>world</div><div>1-1</div></td>
                    <td class="FullScreenMario_value coins"><div>coins</div><div>0</div></td>
                    <td class="FullScreenMario_value lives"><div>lives</div><div>3</div></td>
                </tr>
            </table>
        </div>
    </section>
    <section id="controls" class="length-5" style="display: none;">
        <!-- Controls section -->
    </section>
    <script src="https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/FullScreenMario-0.10.2.min.js"></script>
    <script src="https://57264959-967300405472742195.preview.editmysite.com/uploads/b/11886820-385538800742658772/files/index.min.js"></script>
</body>
</html>
