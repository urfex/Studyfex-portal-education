<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>Idle Miner Tycoon</title>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,minimal-ui">
    <style type="text/css">
        * { padding: 0; margin: 0; }
        html, body {
            background: #000;
            color: #fff;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #c2canvasdiv {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="1280" height="720">
            <h1>Your browser does not appear to support HTML5.</h1>
        </canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@71c149b76c77807157b3cd19d2302ff8feb53593/idlemin.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/bubbls/ruffle@71c149b76c77807157b3cd19d2302ff8feb53593/c2.js"></script>

    <script>
        jQuery(document).ready(function() {
            cr_createRuntime("c2canvas");
        });

        function onVisibilityChanged() {
            if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
                cr_setSuspended(true);
            else
                cr_setSuspended(false);
        };

        document.addEventListener("visibilitychange", onVisibilityChanged, false);
        document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
        document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
    </script>
</body>
</html>
